async function loadDDragon(){
 const status=document.getElementById("dataStatus");
 try{
  const versions=await fetch("https://ddragon.leagueoflegends.com/api/versions.json").then(r=>r.json());ddVersion=versions[0];
  const [champEn,champJa,itemsEn,itemsJa,runesEn,runesJa]=await Promise.all([
   fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/champion.json`).then(r=>r.json()),
   fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/ja_JP/champion.json`).then(r=>r.json()),
   fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/item.json`).then(r=>r.json()),
   fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/ja_JP/item.json`).then(r=>r.json()),
   fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/runesReforged.json`).then(r=>r.json()),
   fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/ja_JP/runesReforged.json`).then(r=>r.json())
  ]);
  championDb=Object.values(champEn.data).map(c=>({key:c.id,en:c.name,ja:champJa.data[c.id]?.name||c.name,tags:c.tags||[]}));
  itemMapEn=buildItemMap(itemsEn.data);itemMapJa=buildItemMap(itemsJa.data);runeMapEn=buildRuneMap(runesEn);runeMapJa=buildRuneMap(runesJa);
  status.textContent=`全${championDb.length}体のチャンピオンを読み込みました：Data Dragon ${ddVersion}`;status.className="success";
 }catch(e){status.textContent="データ読み込みに失敗しました。時間をおいて再読み込みしてください。";status.className="warning";}
}
function buildItemMap(data){const m={};Object.entries(data).forEach(([id,it])=>{m[normalizeName(it.name)]={id,name:it.name,img:`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/item/${id}.png`}});return m}
function buildRuneMap(data){const m={};data.forEach(tree=>{m[normalizeName(tree.name)]={name:tree.name,img:`https://ddragon.leagueoflegends.com/cdn/img/${tree.icon}`};tree.slots.forEach(slot=>slot.runes.forEach(r=>{m[normalizeName(r.name)]={name:r.name,img:`https://ddragon.leagueoflegends.com/cdn/img/${r.icon}`}}))});return m}
function lookupItem(it){const map=lang()==="ja"?itemMapJa:itemMapEn,fb=lang()==="ja"?itemMapEn:itemMapJa;return map[normalizeName(t(it))]||fb[normalizeName(it.en)]||fb[normalizeName(it.ja)]||null}
function lookupRune(r){const map=lang()==="ja"?runeMapJa:runeMapEn,fb=lang()==="ja"?runeMapEn:runeMapJa;return map[normalizeName(t(r))]||fb[normalizeName(r.en)]||fb[normalizeName(r.ja)]||null}
function championName(c){return lang()==="ja"?c.ja:c.en}function championImg(c){return ddVersion?`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/champion/${c.key}.png`:""}

function renderPlayers(){const count=Number(document.getElementById("playerCount").value),box=document.getElementById("players");const old=[...document.querySelectorAll(".player-row")].map(r=>({name:r.querySelector(".playerName")?.value||"",lane:r.querySelector(".playerLane")?.value||"TOP"}));box.innerHTML="";for(let i=0;i<count;i++){const o=old[i]||{};const row=document.createElement("div");row.className="player-row";row.innerHTML=`<input class="playerName" placeholder="プレイヤー${i+1}の名前" value="${escapeHtml(o.name||"")}"/><select class="playerLane">${LANES.map(l=>`<option value="${l}" ${o.lane===l?"selected":""}>${l}</option>`).join("")}</select>`;box.appendChild(row)}}
function getChampionCandidates(lane,mode,used){
 let pool=[];
 if(lane==="なんでも") pool=championDb;
 else{const keys=new Set(LANE_POOLS[lane]||[]);pool=championDb.filter(c=>keys.has(c.key));}
 if(mode==="strong"&&lane!=="なんでも"){const strongKeys=new Set(STRONG_BY_LANE[lane]||[]);pool=pool.filter(c=>strongKeys.has(c.key));}
 if(document.getElementById("duplicateMode").value==="no") pool=pool.filter(c=>!used.has(c.key));
 if(!pool.length&&lane!=="なんでも") pool=championDb.filter(c=>(LANE_POOLS[lane]||[]).includes(c.key));
 if(!pool.length) pool=championDb;
 return pool;
}
function pickBuild(lane,mode){let builds=GENERIC_BUILDS[lane]||GENERIC_BUILDS.TOP;if(mode==="strong") builds=builds.filter(b=>b.strong);if(mode==="fun") builds=builds.filter(b=>b.fun);if(!builds.length) builds=GENERIC_BUILDS[lane]||GENERIC_BUILDS.TOP;return rand(builds)}
function generateChallenge(){const msg=document.getElementById("message");msg.className="warning";msg.textContent="";if(!championDb.length){msg.textContent="まだチャンピオンデータを読み込み中です。少し待ってから押してください。";return}const mode=document.getElementById("powerMode").value,used=new Set(),res=[];[...document.querySelectorAll(".player-row")].forEach((row,i)=>{const name=row.querySelector(".playerName").value.trim()||`プレイヤー${i+1}`;const selectedLane=row.querySelector(".playerLane").value;const lane=selectedLane==="なんでも"?rand(["TOP","JG","MID","ADC","SUP"]):selectedLane;const champ=rand(getChampionCandidates(lane,mode,used));used.add(champ.key);res.push({name,selectedLane,lane,champion:champ,build:pickBuild(lane,mode)})});currentResults=res;renderResults();updateCopyText()}
function rerenderAfterLanguageChange(){renderResults();updateCopyText()}
function renderResults(){const box=document.getElementById("results"),detail=document.getElementById("detailMode").value;box.innerHTML="";currentResults.forEach(r=>{const div=document.createElement("div");div.className="result";div.innerHTML=`<div class="result-head"><img class="champ-img" src="${championImg(r.champion)}" alt="${championName(r.champion)}"><div><h3>${escapeHtml(r.name)}</h3><span class="badge">選択:${r.selectedLane}</span><span class="badge">担当:${r.lane}</span><div class="champion">${championName(r.champion)}</div><div class="build-title">${t(r.build.name)}</div></div></div>${detail==="full"?detailHtml(r):simpleHtml(r)}`;box.appendChild(div)})}
function itemChipHtml(it){const f=lookupItem(it),name=t(it);return`<span class="item-chip">${f?`<img src="${f.img}" alt="${name}">`:""}<span>${name}</span></span>`}
function runeChipHtml(r){const f=lookupRune(r),name=t(r);return`<span class="rune-chip">${f?`<img src="${f.img}" alt="${name}">`:""}<span>${name}</span></span>`}
function detailHtml(r){return`<div class="section-title">アイテム</div><div class="item-list">${r.build.items.map(itemChipHtml).join("")}</div><div class="section-title">ルーン</div><div class="rune-list">${r.build.runes.map(runeChipHtml).join("")}</div><div class="section-title">スキル順</div><div class="small">${r.build.skills}</div><div class="section-title">サモナースペル</div><div class="small">${t(r.build.spell)}</div><div class="section-title">プレイ縛り / メモ</div><div class="small">${t(r.build.note)}</div>`}
function simpleHtml(r){return`<div class="small">${r.build.items.map(t).join(" → ")}</div>`}
function makeText(){if(!currentResults.length)return"";const title=lang()==="ja"?"【LoL ランダム縛り結果】":"【LoL Random Challenge Result】";return title+"\n\n"+currentResults.map(r=>`${r.name}\n${lang()==="ja"?"レーン":"Lane"}：${r.lane}\n${lang()==="ja"?"チャンピオン":"Champion"}：${championName(r.champion)}\n${lang()==="ja"?"ビルド":"Build"}：${t(r.build.name)}\n${lang()==="ja"?"アイテム":"Items"}：${r.build.items.map(t).join(" → ")}\n${lang()==="ja"?"ルーン":"Runes"}：${r.build.runes.map(t).join(" / ")}\n${lang()==="ja"?"スキル順":"Skill Order"}：${r.build.skills}\n${lang()==="ja"?"スペル":"Spells"}：${t(r.build.spell)}\n${lang()==="ja"?"メモ":"Note"}：${t(r.build.note)}`).join("\n\n--------------------\n\n")}
function updateCopyText(){document.getElementById("copyText").value=makeText()}
function copyResult(){const text=makeText(),msg=document.getElementById("message");if(!text){msg.className="warning";msg.textContent="先にランダム決定してください。";return}navigator.clipboard.writeText(text).then(()=>{msg.className="success";msg.textContent="結果をコピーしました。Discordなどに貼り付けできます。"}).catch(()=>{document.getElementById("copyText").select();msg.className="warning";msg.textContent="自動コピーできませんでした。下のテキスト欄を手動コピーしてください。"})}
function clearResult(){currentResults=[];document.getElementById("results").innerHTML="";document.getElementById("copyText").value="";document.getElementById("message").textContent=""}
renderPlayers();loadDDragon();
</script>
</body>
</html>
