<div class="container">
  <h1>LoL ランダム縛りビルドメーカー</h1>
  <p class="description">レーンを選ぶだけで、チャンピオン・ビルド・アイテム・ルーン・スキル順をランダム決定します。</p>

  <div class="card">
    <h2>設定</h2>
    <div class="grid">
      <div><label>人数</label><select id="playerCount" onchange="renderPlayers()"><option value="1">1人</option><option value="2">2人</option><option value="3">3人</option><option value="4">4人</option><option value="5">5人</option><option value="6">6人</option><option value="7">7人</option><option value="8">8人</option><option value="9">9人</option><option value="10">10人</option></select></div>
      <div><label>表示言語</label><select id="languageMode" onchange="rerenderAfterLanguageChange()"><option value="ja">日本語</option><option value="en">English</option></select></div>
      <div><label>抽選モード</label><select id="powerMode"><option value="all">全部からランダム</option><option value="strong">強キャラ・強ビルドのみ</option><option value="fun">ネタ寄り・縛り強め</option></select></div>
      <div><label>同じチャンピオン</label><select id="duplicateMode"><option value="no">被りなし</option><option value="yes">被りあり</option></select></div>
      <div><label>表示</label><select id="detailMode" onchange="renderResults();updateCopyText();"><option value="full">詳細あり</option><option value="simple">簡易表示</option></select></div>
    </div>
    <div id="dataStatus" class="loading">画像データを読み込み中...</div>
  </div>

  <div class="card">
    <h2>参加者</h2>
    <div id="players"></div>
    <div class="buttons">
      <button class="primary" onclick="generateChallenge()">ランダム決定</button>
      <button class="secondary" onclick="generateChallenge()">もう一度ランダム</button>
      <button class="copy" onclick="copyResult()">結果をコピー</button>
      <button class="danger" onclick="clearResult()">結果リセット</button>
    </div>
    <div id="message" class="warning"></div>
  </div>

  <div class="card">
    <h2>結果</h2>
    <div id="results" class="result-grid"></div>
    <textarea id="copyText" readonly placeholder="ランダム決定後、ここにDiscord用コピー文が表示されます。"></textarea>
  </div>
</div>

function item(en,ja){return{en,ja}}
function rune(en,ja){return{en,ja}}
function t(obj){return obj[lang()]||obj.ja||obj.en||""}
function lang(){return document.getElementById("languageMode").value}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function championName(champ){return lang()==="ja"?champ.ja:champ.en}
function championImg(champ){return ddVersion?`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/champion/${champ.key}.png`:""}
function normalizeName(s){return String(s||"").toLowerCase().replace(/[’']/g,"'").replace(/[^a-z0-9ぁ-んァ-ヶー一-龠]/g,"")}

async function loadDDragon(){
  const status=document.getElementById("dataStatus");
  try{
    const versions=await fetch("https://ddragon.leagueoflegends.com/api/versions.json").then(r=>r.json());
    ddVersion=versions[0];
    const [itemsEn,itemsJa,runesEn,runesJa]=await Promise.all([
      fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/item.json`).then(r=>r.json()),
      fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/ja_JP/item.json`).then(r=>r.json()),
      fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/runesReforged.json`).then(r=>r.json()),
      fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/ja_JP/runesReforged.json`).then(r=>r.json())
    ]);
    itemMapEn=buildItemMap(itemsEn.data);
    itemMapJa=buildItemMap(itemsJa.data);
    runeMapEn=buildRuneMap(runesEn);
    runeMapJa=buildRuneMap(runesJa);
    status.textContent=`画像データ読み込み完了：Data Dragon ${ddVersion}`;
    status.className="success";
    renderResults();
  }catch(e){
    status.textContent="画像データの自動読み込みに失敗しました。名前表示のみで利用できます。";
    status.className="warning";
  }
}
function buildItemMap(data){
  const map={};
  Object.entries(data).forEach(([id,it])=>{map[normalizeName(it.name)]={id,name:it.name,img:`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/item/${id}.png`}});
  return map;
}
function buildRuneMap(data){
  const map={};
  data.forEach(tree=>{
    map[normalizeName(tree.name)]={name:tree.name,img:`https://ddragon.leagueoflegends.com/cdn/img/${tree.icon}`};
    tree.slots.forEach(slot=>slot.runes.forEach(r=>{map[normalizeName(r.name)]={name:r.name,img:`https://ddragon.leagueoflegends.com/cdn/img/${r.icon}`}}));
  });
  return map;
}
function lookupItem(it){
  const map=lang()==="ja"?itemMapJa:itemMapEn;
  const fallback=lang()==="ja"?itemMapEn:itemMapJa;
  return map[normalizeName(t(it))]||fallback[normalizeName(it.en)]||fallback[normalizeName(it.ja)]||null;
}
function lookupRune(r){
  const map=lang()==="ja"?runeMapJa:runeMapEn;
  const fallback=lang()==="ja"?runeMapEn:runeMapJa;
  return map[normalizeName(t(r))]||fallback[normalizeName(r.en)]||fallback[normalizeName(r.ja)]||null;
}

function renderPlayers(){
  const count=Number(document.getElementById("playerCount").value);
  const box=document.getElementById("players");
  const oldRows=[...document.querySelectorAll(".player-row")].map(row=>({name:row.querySelector(".playerName")?.value||"",lane:row.querySelector(".playerLane")?.value||"TOP"}));
  box.innerHTML="";
  for(let i=0;i<count;i++){
    const row=document.createElement("div");
    row.className="player-row";
    const old=oldRows[i]||{};
    row.innerHTML=`<input class="playerName" placeholder="プレイヤー${i+1}の名前" value="${escapeHtml(old.name||"")}"/><select class="playerLane">${LANES.map(l=>`<option value="${l}" ${old.lane===l?"selected":""}>${l}</option>`).join("")}</select>`;
    box.appendChild(row);
  }
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]))}
function getCandidates(lane,mode,usedChampions){
  let candidates=DATA.filter(d=>lane==="なんでも"||d.lane===lane);
  if(mode==="strong") candidates=candidates.filter(d=>d.strong&&d.builds.some(b=>b.strong));
  if(mode==="fun") candidates=candidates.filter(d=>d.builds.some(b=>b.fun));
  if(document.getElementById("duplicateMode").value==="no") candidates=candidates.filter(d=>!usedChampions.has(d.champion.key));
  return candidates;
}
function pickBuild(championData,mode){
  let builds=championData.builds;
  if(mode==="strong") builds=builds.filter(b=>b.strong);
  if(mode==="fun") builds=builds.filter(b=>b.fun);
  if(!builds.length) builds=championData.builds;
  return rand(builds);
}
let currentResults=[];
function generateChallenge(){
  const rows=[...document.querySelectorAll(".player-row")];
  const mode=document.getElementById("powerMode").value;
  const usedChampions=new Set();
  const results=[];
  const message=document.getElementById("message");
  message.className="warning";message.textContent="";
  rows.forEach((row,index)=>{
    const name=row.querySelector(".playerName").value.trim()||`プレイヤー${index+1}`;
    const selectedLane=row.querySelector(".playerLane").value;
    let candidates=getCandidates(selectedLane,mode,usedChampions);
    if(!candidates.length)candidates=getCandidates(selectedLane,"all",usedChampions);
    if(!candidates.length)candidates=DATA.filter(d=>selectedLane==="なんでも"||d.lane===selectedLane);
    const championData=rand(candidates);
    const build=pickBuild(championData,mode);
    usedChampions.add(championData.champion.key);
    results.push({name,selectedLane,lane:championData.lane,champion:championData.champion,build});
  });
  currentResults=results;
  renderResults();
  updateCopyText();
}
function rerenderAfterLanguageChange(){renderResults();updateCopyText();}
function renderResults(){
  const box=document.getElementById("results");
  const detail=document.getElementById("detailMode").value;
  box.innerHTML="";
  currentResults.forEach(r=>{
    const div=document.createElement("div");
    div.className="result";
    const champImg=championImg(r.champion);
    div.innerHTML=`
      <div class="result-head">
        ${champImg?`<img class="champ-img" src="${champImg}" alt="${championName(r.champion)}">`:`<div class="champ-img"></div>`}
        <div>
          <h3>${escapeHtml(r.name)}</h3>
          <span class="badge">選択:${r.selectedLane}</span><span class="badge">担当:${r.lane}</span>
          <div class="champion">${championName(r.champion)}</div>
          <div class="build-title">${t(r.build.name)}</div>
        </div>
      </div>
      ${detail==="full"?detailHtml(r):simpleHtml(r)}
    `;
    box.appendChild(div);
  });
}
function itemChipHtml(it){
  const found=lookupItem(it);
  const name=t(it);
  return `<span class="item-chip">${found?`<img src="${found.img}" alt="${name}">`:""}<span>${name}</span></span>`;
}
function runeChipHtml(r){
  const found=lookupRune(r);
  const name=t(r);
  return `<span class="rune-chip">${found?`<img src="${found.img}" alt="${name}">`:""}<span>${name}</span></span>`;
}
function detailHtml(r){
  return `<div class="section-title">アイテム</div><div class="item-list">${r.build.items.map(itemChipHtml).join("")}</div><div class="section-title">ルーン</div><div class="rune-list">${r.build.runes.map(runeChipHtml).join("")}</div><div class="section-title">スキル順</div><div class="small">${r.build.skills}</div><div class="section-title">サモナースペル</div><div class="small">${t(r.build.spell)}</div><div class="section-title">プレイ縛り / メモ</div><div class="small">${t(r.build.note)}</div>`;
}
function simpleHtml(r){return `<div class="small">${r.build.items.map(t).join(" → ")}</div>`}
function makeText(){
  if(!currentResults.length)return"";
  const title=lang()==="ja"?"【LoL ランダム縛り結果】":"【LoL Random Challenge Result】";
  return title+"\n\n"+currentResults.map(r=>`${r.name}\n${lang()==="ja"?"レーン":"Lane"}：${r.lane}\n${lang()==="ja"?"チャンピオン":"Champion"}：${championName(r.champion)}\n${lang()==="ja"?"ビルド":"Build"}：${t(r.build.name)}\n${lang()==="ja"?"アイテム":"Items"}：${r.build.items.map(t).join(" → ")}\n${lang()==="ja"?"ルーン":"Runes"}：${r.build.runes.map(t).join(" / ")}\n${lang()==="ja"?"スキル順":"Skill Order"}：${r.build.skills}\n${lang()==="ja"?"スペル":"Spells"}：${t(r.build.spell)}\n${lang()==="ja"?"メモ":"Note"}：${t(r.build.note)}`).join("\n\n--------------------\n\n");
}
function updateCopyText(){document.getElementById("copyText").value=makeText()}
function copyResult(){
  const text=makeText();const msg=document.getElementById("message");
  if(!text){msg.className="warning";msg.textContent="先にランダム決定してください。";return}
  navigator.clipboard.writeText(text).then(()=>{msg.className="success";msg.textContent="結果をコピーしました。Discordなどに貼り付けできます。"}).catch(()=>{document.getElementById("copyText").select();msg.className="warning";msg.textContent="自動コピーできませんでした。下のテキスト欄を手動コピーしてください。"});
}
function clearResult(){currentResults=[];document.getElementById("results").innerHTML="";document.getElementById("copyText").value="";document.getElementById("message").textContent=""}
renderPlayers();
loadDDragon();
</script>
</body>
</html>
